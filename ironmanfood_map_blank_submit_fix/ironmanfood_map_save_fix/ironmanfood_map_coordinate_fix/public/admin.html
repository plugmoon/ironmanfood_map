<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>販售據點後台</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script defer src="/js/admin.js"></script>
  </head>
  <body class="admin-body">
    <header class="admin-header">
      <a class="admin-brand" href="/">販售據點</a>
      <div class="admin-session" id="adminSession" hidden>
        <span id="sessionName"></span>
        <button id="logoutButton" class="ghost-button compact" type="button">登出</button>
      </div>
    </header>

    <main class="admin-shell">
      <section class="auth-panel" id="loginView">
        <form id="loginForm" class="auth-box">
          <h1>後台登入</h1>
          <label>
            <span>帳號</span>
            <input name="username" type="text" autocomplete="username" required>
          </label>
          <label>
            <span>密碼</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary-button" type="submit">登入</button>
          <p class="form-message" id="loginMessage" role="alert"></p>
        </form>
      </section>

      <section class="admin-grid" id="adminView" hidden>
        <section class="edit-panel">
          <div class="panel-heading">
            <h1 id="formTitle">新增據點</h1>
            <button id="resetButton" class="ghost-button compact" type="button">清空</button>
          </div>
          <form id="locationForm" class="location-form">
            <input type="hidden" name="id">
            <label>
              <span>站別代碼</span>
              <input name="station_code" type="text" autocomplete="off">
            </label>
            <label>
              <span>區域</span>
              <input name="region" type="text" autocomplete="off" placeholder="北部、中部、南部">
            </label>
            <label class="wide">
              <span>商家名稱</span>
              <input name="name" type="text" autocomplete="off" required>
            </label>
            <label>
              <span>縣市</span>
              <input name="city" type="text" autocomplete="off">
            </label>
            <label>
              <span>行政區</span>
              <input name="district" type="text" autocomplete="off">
            </label>
            <label class="wide">
              <span>地址</span>
              <input name="address" type="text" autocomplete="off">
            </label>
            <label>
              <span>負責人</span>
              <input name="manager_name" type="text" autocomplete="off">
            </label>
            <label>
              <span>電話</span>
              <input name="phone" type="tel" autocomplete="off">
            </label>
            <fieldset class="delivery-field wide">
              <legend>前台顯示</legend>
              <label class="check-line">
                <input name="show_manager" type="checkbox" value="1" checked>
                <span>顯示負責人</span>
              </label>
              <label class="check-line">
                <input name="show_phone" type="checkbox" value="1" checked>
                <span>顯示電話</span>
              </label>
            </fieldset>
            <label class="wide">
              <span>營業時間</span>
              <input name="business_hours" type="text" autocomplete="off">
            </label>
            <fieldset class="delivery-field wide">
              <legend>外送支援</legend>
              <label class="check-line">
                <input name="support_uber" type="checkbox" value="1">
                <span>支援 Uber 外送</span>
              </label>
              <label class="check-line">
                <input name="support_panda" type="checkbox" value="1">
                <span>支援熊貓外送</span>
              </label>
            </fieldset>
            <label>
              <span>緯度</span>
              <input name="lat" type="number" step="any" autocomplete="off">
            </label>
            <label>
              <span>經度</span>
              <input name="lng" type="number" step="any" autocomplete="off">
            </label>
            <label>
              <span>排序</span>
              <input name="sort_order" type="number" step="1" value="0">
            </label>
            <label>
              <span>狀態</span>
              <select name="status">
                <option value="1">顯示</option>
                <option value="0">隱藏</option>
              </select>
            </label>
            <label class="wide">
              <span>Google 地圖連結</span>
              <input name="map_url" type="url" autocomplete="off" placeholder="可留空，前台會用地址或座標開啟 Google 地圖">
            </label>
            <div class="form-actions wide">
              <button class="primary-button" type="submit">儲存</button>
              <p class="form-message" id="formMessage" role="status"></p>
            </div>
          </form>
          <iframe id="adminMap" class="admin-map google-map-frame" title="Google 地圖預覽" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>

        <section class="list-panel">
          <div class="panel-heading">
            <h2>據點資料</h2>
            <a class="secondary-link" href="/api/admin/export.csv">匯出 CSV</a>
          </div>
          <div class="admin-tools">
            <input id="adminKeyword" type="search" placeholder="搜尋">
            <select id="adminStatus">
              <option value="">全部狀態</option>
              <option value="1">顯示</option>
              <option value="0">隱藏</option>
            </select>
            <select id="importMode">
              <option value="append">附加匯入</option>
              <option value="replace">覆蓋匯入</option>
            </select>
            <label class="file-button">
              匯入 CSV
              <input id="csvInput" type="file" accept=".csv,text/csv">
            </label>
          </div>
          <p class="form-message" id="importMessage" role="status"></p>
          <div class="table-wrap">
            <table class="location-table">
              <thead>
                <tr>
                  <th>商家</th>
                  <th>地區</th>
                  <th>電話</th>
                  <th>狀態</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="locationRows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
