services:
  - type: web
    name: ironmanfood-map
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ironmanfood-map-db
          property: connectionString

databases:
  - name: ironmanfood-map-db
    plan: free
    region: singapore
    databaseName: ironmanfoodmap
    user: ironmanfood
